<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="cart-page-body">
  <main class="cart-page order-page" data-page="order">
    <header class="cart-header">
      <div>
        <h1>Оформление заказа 📝</h1>
        <p>Заполните данные для быстрой доставки.</p>
      </div>
      <button class="back-button" id="back-to-cart" type="button">← Назад в корзину</button>
    </header>

    <section class="order-layout">
      <section class="order-summary-card">
        <h2>Ваш заказ:</h2>
        <div id="order-items" class="order-items"></div>
        <div class="order-total-box">
          <span>Итого</span>
          <strong id="order-total">0 ₽</strong>
        </div>
      </section>

      <section class="order-form-card">
        <form id="order-form" novalidate>
          <div class="form-group">
            <label for="customer-name">Имя</label>
            <input id="customer-name" name="name" class="form-input" type="text" placeholder="Ваше имя" autocomplete="name">
            <p class="form-error" id="error-name"></p>
          </div>

          <div class="form-group">
            <label for="customer-phone">Телефон</label>
            <input id="customer-phone" name="phone" class="form-input" type="tel" placeholder="+7 (___) ___-__-__" autocomplete="tel">
            <p class="form-error" id="error-phone"></p>
          </div>

          <div class="form-group">
            <label for="customer-address">Адрес доставки</label>
            <input id="customer-address" name="address" class="form-input" type="text" placeholder="Улица, дом, квартира" autocomplete="street-address">
            <p class="form-error" id="error-address"></p>
          </div>

          <div class="form-group">
            <label for="customer-comment">Комментарий</label>
            <textarea id="customer-comment" name="comment" class="form-input form-textarea" rows="3" placeholder="Комментарий к заказу (необязательно)"></textarea>
            <p class="form-error" id="error-comment"></p>
          </div>

          <button class="checkout-button order-submit-button" id="submit-order-button" type="submit">Оформить заказ</button>
        </form>
      </section>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
