<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Доставка пиццы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: "0 18px 45px rgba(15, 23, 42, 0.12)"
          },
          animation: {
            "slide-up": "slideUp 0.25s ease-out",
            "fade-in": "fadeIn 0.2s ease-out"
          },
          keyframes: {
            slideUp: {
              "0%": { transform: "translateY(18px)", opacity: "0" },
              "100%": { transform: "translateY(0)", opacity: "1" }
            },
            fadeIn: {
              "0%": { opacity: "0" },
              "100%": { opacity: "1" }
            }
          }
        }
      }
    };
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/framer-motion@10.18.0/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root">
    <h1>Доставка пиццы 🍕</h1>
    <p id="welcome-message" style="text-align: center; font-size: 18px; color: #666;"></p>
  </div>
  <script type="text/babel" data-presets="typescript,react" src="./app.tsx"></script>
</body>
</html>
